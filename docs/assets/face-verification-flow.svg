<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560">
  <defs><style>.title{font:700 26px Inter,Arial;fill:#0f172a}.box{fill:white;stroke:#cbd5e1;stroke-width:2;rx:16}.decision{fill:#fef3c7;stroke:#f59e0b;stroke-width:2}.ok{fill:#dcfce7;stroke:#22c55e;stroke-width:2;rx:16}.bad{fill:#fee2e2;stroke:#ef4444;stroke-width:2;rx:16}.txt{font:700 15px Inter,Arial;fill:#111827}.small{font:500 12px Inter,Arial;fill:#64748b}.line{stroke:#64748b;stroke-width:2.2;fill:none;marker-end:url(#a)}.label{font:700 12px Inter,Arial;fill:#475569}</style><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker></defs>
  <rect width="1200" height="560" rx="24" fill="#f8fafc"/><text x="50" y="55" class="title">Validasi GPS dan Wajah saat Check-in / Check-out</text>
  <rect x="60" y="130" width="170" height="76" class="box"/><text x="145" y="162" text-anchor="middle" class="txt">Ambil Foto</text><text x="145" y="184" text-anchor="middle" class="small">kamera sales</text>
  <polygon points="330,115 430,168 330,221 230,168" class="decision"/><text x="330" y="163" text-anchor="middle" class="txt">Ada Wajah?</text><text x="330" y="183" text-anchor="middle" class="small">face detected</text>
  <rect x="255" y="330" width="150" height="76" class="bad"/><text x="330" y="362" text-anchor="middle" class="txt">Ditolak / Review</text><text x="330" y="384" text-anchor="middle" class="small">tidak ada wajah</text>
  <polygon points="590,115 710,168 590,221 470,168" class="decision"/><text x="590" y="160" text-anchor="middle" class="txt">Recognition</text><text x="590" y="180" text-anchor="middle" class="small">aktif?</text>
  <rect x="520" y="330" width="150" height="76" class="ok"/><text x="595" y="362" text-anchor="middle" class="txt">Valid</text><text x="595" y="384" text-anchor="middle" class="small">cukup ada wajah</text>
  <rect x="780" y="130" width="180" height="76" class="box"/><text x="870" y="162" text-anchor="middle" class="txt">Cocokkan Wajah</text><text x="870" y="184" text-anchor="middle" class="small">dengan template user</text>
  <polygon points="1040,115 1150,168 1040,221 930,168" class="decision"/><text x="1040" y="162" text-anchor="middle" class="txt">Cocok?</text><text x="1040" y="182" text-anchor="middle" class="small">identity match</text>
  <rect x="965" y="330" width="150" height="76" class="ok"/><text x="1040" y="362" text-anchor="middle" class="txt">Valid</text><text x="1040" y="384" text-anchor="middle" class="small">identitas sesuai</text>
  <rect x="760" y="330" width="170" height="76" class="bad"/><text x="845" y="362" text-anchor="middle" class="txt">Ditolak / Review</text><text x="845" y="384" text-anchor="middle" class="small">wajah tidak cocok</text>
  <path d="M230 168 L230 168 L230 168" class="line"/><path d="M230 168 L60 168" class="line" transform="rotate(180 145 168)"/>
  <path d="M430 168 L470 168" class="line"/><path d="M330 221 L330 330" class="line"/><path d="M710 168 L780 168" class="line"/><path d="M590 221 L595 330" class="line"/><path d="M960 168 L930 168" class="line" transform="rotate(180 945 168)"/><path d="M1040 221 L1040 330" class="line"/><path d="M1015 215 C980 270 900 300 845 330" class="line"/>
  <text x="445" y="150" class="label">Ya</text><text x="350" y="285" class="label">Tidak</text><text x="720" y="150" class="label">Ya</text><text x="610" y="285" class="label">Tidak</text><text x="1058" y="285" class="label">Ya</text><text x="940" y="292" class="label">Tidak</text>
</svg>
