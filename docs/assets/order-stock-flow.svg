<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520">
  <defs>
    <style>
      .t{font:700 26px Arial,sans-serif;fill:#0f172a}
      .x{font:700 16px Arial,sans-serif;fill:#111827}
      .s{font:500 12px Arial,sans-serif;fill:#64748b}
      .b{fill:#ffffff;stroke:#cbd5e1;stroke-width:2}
      .g{fill:#dcfce7;stroke:#22c55e;stroke-width:2}
      .y{fill:#fef3c7;stroke:#f59e0b;stroke-width:2}
      .p{fill:#e0e7ff;stroke:#6366f1;stroke-width:2}
      .l{stroke:#64748b;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b" />
    </marker>
  </defs>

  <rect width="1200" height="520" rx="24" fill="#f8fafc" />
  <text x="50" y="55" class="t">Alur Order, Stok, Piutang, dan Konsinyasi</text>

  <rect x="60" y="150" width="155" height="76" rx="16" class="b" />
  <text x="137" y="181" text-anchor="middle" class="x">Visit</text>
  <text x="137" y="203" text-anchor="middle" class="s">kunjungan outlet</text>

  <rect x="260" y="150" width="155" height="76" rx="16" class="b" />
  <text x="337" y="181" text-anchor="middle" class="x">Order</text>
  <text x="337" y="203" text-anchor="middle" class="s">produk + qty</text>

  <rect x="460" y="150" width="155" height="76" rx="16" class="y" />
  <text x="537" y="181" text-anchor="middle" class="x">Approval</text>
  <text x="537" y="203" text-anchor="middle" class="s">cek dan setujui</text>

  <rect x="660" y="150" width="155" height="76" rx="16" class="g" />
  <text x="737" y="181" text-anchor="middle" class="x">Stok Berkurang</text>
  <text x="737" y="203" text-anchor="middle" class="s">inventory update</text>

  <rect x="860" y="150" width="155" height="76" rx="16" class="p" />
  <text x="937" y="181" text-anchor="middle" class="x">Transaksi</text>
  <text x="937" y="203" text-anchor="middle" class="s">lunas / kredit / titip</text>

  <rect x="820" y="330" width="155" height="76" rx="16" class="b" />
  <text x="897" y="361" text-anchor="middle" class="x">Piutang</text>
  <text x="897" y="383" text-anchor="middle" class="s">jika kredit</text>

  <rect x="1010" y="330" width="155" height="76" rx="16" class="b" />
  <text x="1087" y="361" text-anchor="middle" class="x">Konsinyasi</text>
  <text x="1087" y="383" text-anchor="middle" class="s">barang titipan</text>

  <path d="M215 188 L260 188" class="l" />
  <path d="M415 188 L460 188" class="l" />
  <path d="M615 188 L660 188" class="l" />
  <path d="M815 188 L860 188" class="l" />
  <path d="M937 226 C930 270 910 300 897 330" class="l" />
  <path d="M970 226 C1015 270 1060 300 1087 330" class="l" />
</svg>
